<!DOCTYPE html>
<html>
<head>

<title>SREE SHARAVAANI TUTORIALS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{font-family:Arial;background:#f5f7fb;padding:20px}

header{background:#1f3cff;color:white;padding:15px;text-align:center;border-radius:10px}

input,select,button{padding:6px;margin:5px;border-radius:5px;border:1px solid #999}

button{background:#dde6ff;cursor:pointer}

button:hover{background:#c7d3ff}

table{width:100%;border-collapse:collapse;background:white;margin-top:10px}

th,td{border:1px solid #aaa;padding:6px;text-align:center}

.error{color:red;font-weight:bold}

.admin-danger{background:#ff4d4d;color:white}

</style>

</head>

<body>

<header>
<h2>SREE SHARAVAANI TUTORIALS</h2>
</header>

<hr>

<!-- LOGIN -->

<div id="loginBox">

<h3>Admin Login</h3>

<input id="username" placeholder="Username"><br>

<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="loginMsg" class="error"></p>

</div>

<!-- MAIN SYSTEM -->

<div id="mainPage" style="display:none">

<hr>

<h3>Add Students</h3>

<input id="studentName" placeholder="Student Name">

<button onclick="addStudent()">Add</button>

<p id="nameMsg" class="error"></p>

<select id="studentList" size="5"></select>

<hr>

<h3>Fee Entry</h3>

Receipt : <span id="receiptNo">Auto</span><br>

Class <input id="sclass"><br>

Date <input type="date" id="sdate"><br>

Amount <input id="samount"><br>

Balance <input id="sbalance" value="0"><br>

<button onclick="submitFee()">Submit</button>

<p id="feeMsg" class="error"></p>

<hr>

<h3>Full Student Fee History</h3>

<button onclick="showHistory()">Show Full Fee History</button>

<table id="historyTable">

<tr>
<th>Receipt</th>
<th>Name</th>
<th>Class</th>
<th>Date</th>
<th>Amount</th>
<th>Balance</th>
</tr>

</table>

<hr>

<h3>Search Student</h3>

<input id="searchBox" placeholder="Enter student name">

<button onclick="searchStudent()">Search</button>

<p id="searchResult"></p>

<hr>

<h3>Monthly Pending</h3>

<input type="month" id="monthInput">

<button onclick="monthlyPending()">Show</button>

<p id="pendingResult"></p>

<hr>

<button onclick="exportExcel()">Export Excel</button>

<button onclick="wipeData()" class="admin-danger">Wipe Database</button>

<hr>

<table id="dataTable">

<tr>
<th>Receipt</th>
<th>Name</th>
<th>Class</th>
<th>Date</th>
<th>Amount</th>
<th>Balance</th>
</tr>

</table>

</div>

<script>

/* SUPABASE CONNECTION */

const SUPABASE_URL="https://ppqxbzavjfhtybdjjkxn.supabase.co";
const SUPABASE_KEY="sb_publishable_Z9ewRm0WC6hw6h7S9333qA_F0ilfP-s";

const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

/* LOGIN */

function login(){

if(username.value==="Vishnu" && password.value==="918252"){

loginBox.style.display="none";
mainPage.style.display="block";

loadTable();

}else{

loginMsg.innerText="Invalid Login";

}

}

/* STUDENTS */

let students=[];

function addStudent(){

let name=studentName.value.trim();

if(name===""){
nameMsg.innerText="Enter student name";
return;
}

let exists=students.some(s=>s.toLowerCase()===name.toLowerCase());

if(exists){

nameMsg.innerText="Duplicate name not allowed";
return;

}

students.push(name);

updateList();

studentName.value="";
nameMsg.innerText="";

}

function updateList(){

studentList.innerHTML="";

students.forEach(s=>{

let o=document.createElement("option");
o.text=s;

studentList.add(o);

});

}

/* TABLE */

function addRow(d){

let r=dataTable.insertRow();

r.insertCell().innerText=d.receipt;
r.insertCell().innerText=d.name;
r.insertCell().innerText=d.cls;
r.insertCell().innerText=d.date;
r.insertCell().innerText=d.amt;
r.insertCell().innerText=d.balance;

}

/* RECEIPT AUTO */

async function getReceipt(){

const {data}=await supabaseClient
.from("tuition_records")
.select("receipt_no")
.order("receipt_no",{ascending:false})
.limit(1);

if(!data || data.length==0) return 1;

return data[0].receipt_no+1;

}

/* SUBMIT FEE */

async function submitFee(){

feeMsg.innerText="";

let name=studentList.value;

if(!name){

feeMsg.innerText="Select student";
return;

}

let cls=sclass.value;
let date=sdate.value;
let amt=samount.value;
let bal=sbalance.value;

let month=date.slice(0,7);

const {data:existing}=await supabaseClient
.from("tuition_records")
.select("*")
.eq("student_name",name);

let paid=existing.find(r=>r.fee_date.startsWith(month));

if(paid){

feeMsg.innerText="Already paid this month";
return;

}

let receipt=await getReceipt();

await supabaseClient
.from("tuition_records")
.insert([{

student_name:name,
class:cls,
receipt_no:receipt,
fee_date:date,
amount:amt,
balance:bal

}]);

addRow({

receipt:receipt,
name:name,
cls:cls,
date:date,
amt:amt,
balance:bal

});

}

/* LOAD TABLE */

async function loadTable(){

const {data}=await supabaseClient
.from("tuition_records")
.select("*")
.order("receipt_no",{ascending:true});

data.forEach(r=>{

addRow({

receipt:r.receipt_no,
name:r.student_name,
cls:r.class,
date:r.fee_date,
amt:r.amount,
balance:r.balance

});

});

}

/* STUDENT HISTORY DASHBOARD */

async function showHistory(){

let name=studentList.value;

if(!name){

alert("Select student");
return;

}

historyTable.innerHTML=`
<tr>
<th>Receipt</th>
<th>Name</th>
<th>Class</th>
<th>Date</th>
<th>Amount</th>
<th>Balance</th>
</tr>`;

const {data}=await supabaseClient
.from("tuition_records")
.select("*")
.eq("student_name",name)
.order("receipt_no",{ascending:true});

data.forEach(r=>{

let row=historyTable.insertRow();

row.insertCell().innerText=r.receipt_no;
row.insertCell().innerText=r.student_name;
row.insertCell().innerText=r.class;
row.insertCell().innerText=r.fee_date;
row.insertCell().innerText=r.amount;
row.insertCell().innerText=r.balance;

});

}

/* SEARCH */

async function searchStudent(){

let name=searchBox.value;

const {data}=await supabaseClient
.from("tuition_records")
.select("*")
.eq("student_name",name);

if(!data || data.length==0){

searchResult.innerText="No records found";
return;

}

let txt="";

data.forEach(r=>{

txt+=`Receipt:${r.receipt_no} Date:${r.fee_date} Amount:${r.amount}\n`;

});

searchResult.innerText=txt;

}

/* MONTHLY PENDING */

async function monthlyPending(){

let m=monthInput.value;

const {data}=await supabaseClient
.from("tuition_records")
.select("*");

let paid=data
.filter(r=>r.fee_date.startsWith(m))
.map(r=>r.student_name);

let pending=students.filter(s=>!paid.includes(s));

pendingResult.innerText="Pending : "+pending.join(",");

}

/* EXPORT */

async function exportExcel(){

const {data}=await supabaseClient
.from("tuition_records")
.select("*");

let csv="Receipt,Name,Class,Date,Amount,Balance\n";

data.forEach(r=>{

csv+=`${r.receipt_no},${r.student_name},${r.class},${r.fee_date},${r.amount},${r.balance}\n`;

});

let a=document.createElement("a");

a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));

a.download="Tuition_Data.csv";

a.click();

}

/* WIPE DATABASE */

async function wipeData(){

let u=prompt("Enter Admin Username");
let p=prompt("Enter Admin Password");

if(u==="Vishnu" && p==="918252"){

if(confirm("Delete ALL database records permanently?")){

await supabaseClient
.from("tuition_records")
.delete()
.gte("receipt_no",0);

alert("Database wiped successfully");

location.reload();

}

}else{

alert("Unauthorized Access");

}

}

</script>

</body>
</html>
